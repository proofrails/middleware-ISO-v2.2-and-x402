[pytest]
testpaths = tests
# Disable the web3 pytest plugin — eth_typing version conflict
# Ignore old smoke tests that require a live server (run with -m network or directly)
addopts = -p no:pytest_ethereum --ignore=tests/test_agent_anchoring_smoke.py --ignore=tests/test_x402_smoke.py

markers =
    unit: fast, in-process, no external dependencies
    integration: requires a running database (SQLite OK, no Redis/RPC)
    network: requires a live server, RPC node, or blockchain
    e2e: full end-to-end requiring all services
